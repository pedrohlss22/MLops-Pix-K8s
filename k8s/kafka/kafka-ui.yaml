apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
      - name: kafka-ui
        image: provectuslabs/kafka-ui:latest
        ports:
        - containerPort: 8080
        env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: "PIX-Cluster-Producao"
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: "pix-cluster-kafka-bootstrap:9092"
        - name: DYNAMIC_CONFIG_ENABLED
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui-service
  namespace: datalake
spec:
  selector:
    app: kafka-ui
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080