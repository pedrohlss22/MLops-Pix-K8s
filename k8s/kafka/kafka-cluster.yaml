apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: datalake
  labels:
    strimzi.io/cluster: pix-cluster
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 10Gi
    class: standard
  resources:
    requests:
      memory: 512Mi
      cpu: "100m"
    limits:
      memory: 1Gi
      cpu: "500m"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: pix-cluster
  namespace: datalake
  annotations:
    strimzi.io/node-pools: "enabled"
    strimzi.io/kraft: "enabled"
spec:
  kafka:
    version: 3.7.0
    metadataVersion: 3.7-IV4
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: transacoes-pix
  namespace: datalake
  labels:
    strimzi.io/cluster: pix-cluster
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: 86400000
    segment.bytes: 1073741824
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: transacoes-pix-dlq
  namespace: datalake
  labels:
    strimzi.io/cluster: pix-cluster
spec:
  partitions: 1
  replicas: 1
  config:
    retention.ms: 604800000
    segment.bytes: 1073741824
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: spark-kafka-user
  namespace: datalake
  labels:
    strimzi.io/cluster: pix-cluster
spec:
  authentication:
    type: scram-sha-512