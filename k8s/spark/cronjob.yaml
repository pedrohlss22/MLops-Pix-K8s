apiVersion: batch/v1
kind: CronJob
metadata:
  name: spark-treino-diario
  namespace: datalake
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: spark
          containers:
          - name: spark
            image: bitnami/spark:3.5.1   # imagem mais completa
            command:
              - "/opt/bitnami/spark/bin/spark-submit"
              - "--master"
              - "k8s://https://kubernetes.default.svc"
              - "--deploy-mode"
              - "cluster"
              - "--name"
              - "pix-treino-diario"
              - "--conf"
              - "spark.kubernetes.container.image=bitnami/spark:3.5.1"
              - "--conf"
              - "spark.kubernetes.namespace=datalake"
              - "--conf"
              - "spark.kubernetes.authenticate.driver.serviceAccountName=spark"
              - "--conf"
              - "spark.executor.instances=2"
              - "--conf"
              - "spark.executor.memory=2g"
              - "--packages"
              - "org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262"
              - "/scripts/pix_fraud_pipeline.py"
            env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow-service.datalake.svc.cluster.local:5000"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
            volumeMounts:
            - name: script-volume
              mountPath: /scripts
          volumes:
          - name: script-volume
            configMap:
              name: spark-treino-code
          restartPolicy: Never