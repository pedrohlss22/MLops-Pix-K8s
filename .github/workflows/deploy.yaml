name: Deploy API to Azure (CI/CD)

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:  
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # CORREÇÃO: Apontando para o novo diretório do arquivo
          pip install -r src/api/requirements.txt
          pip install pytest httpx pyspark

      - name: Run Tests
        run: |
          PYTHONPATH=./ pytest tests/

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrmlopspix

      - name: Build and Push Docker Image
        run: |
          docker build -t acrmlopspix.azurecr.io/fraud-api:${{ github.sha }} .
          docker push acrmlopspix.azurecr.io/fraud-api:${{ github.sha }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ProjetoMLOps-RG-v3
          cluster-name: ClusterMLOps

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/fraud-api fraud-api=acrmlopspix.azurecr.io/fraud-api:${{ github.sha }} -n datalake
          kubectl rollout status deployment/fraud-api -n datalake --timeout=90s
